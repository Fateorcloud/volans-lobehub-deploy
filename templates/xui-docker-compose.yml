services:
  xui:
    image: ghcr.io/mhsanaei/3x-ui:${XUI_VERSION:-v3.0.2}
    container_name: xui-3xui
    restart: unless-stopped
    tty: true
    expose:
      - "${XUI_PANEL_PORT:-12053}"
    ports:
      - "${XUI_REALITY_PORT:-31444}:${XUI_REALITY_PORT:-31444}/tcp"
    volumes:
      - ./db:/etc/x-ui
      - ./cert:/root/cert
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
    cpus: 0.75
    mem_limit: 512m
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
