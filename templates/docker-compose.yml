name: ai-platform

networks:
  ai-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16
          gateway: 172.18.0.1
  xui_default:
    external: true

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-15.8-alpine}
    container_name: postgres
    restart: always
    logging: *default-logging
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    networks:
      - ai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  newapi:
    image: calciumion/new-api:${NEWAPI_VERSION:-latest}
    container_name: newapi
    restart: always
    logging: *default-logging
    extra_hosts:
      - "host.docker.internal:172.18.0.1"
    environment:
      SQL_DSN: postgresql://${DB_USER}:${DB_PASS}@postgres:5432/newapi_db
      TZ: ${TZ:-Asia/Shanghai}
      GODEBUG: http2client=0
      HTTP_PROXY: http://host.docker.internal:7890
      HTTPS_PROXY: http://host.docker.internal:7890
      NO_PROXY: localhost,127.0.0.1,.local,postgres,newapi,open-webui,172.16.0.0/12,10.0.0.0/8
      http_proxy: http://host.docker.internal:7890
      https_proxy: http://host.docker.internal:7890
      no_proxy: localhost,127.0.0.1,.local,postgres,newapi,open-webui,172.16.0.0/12,10.0.0.0/8
    volumes:
      - ./newapi_data:/data
    expose:
      - "3000"
    networks:
      - ai-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/status >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  open-webui:
    image: ghcr.io/open-webui/open-webui:${OPENWEBUI_VERSION:-main}
    container_name: open-webui
    restart: always
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASS}@postgres:5432/openwebui_db
      OPENAI_API_BASE_URL: http://newapi:3000/v1
      OPENAI_API_KEY: ${NEWAPI_MASTER_KEY}
      WEBUI_URL: https://${CHAT_DOMAIN:-chat.example.com}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      ENABLE_PERSISTENT_CONFIG: "False"
      ENABLE_SIGNUP: ${OPENWEBUI_ENABLE_SIGNUP:-true}
      DEFAULT_USER_ROLE: ${OPENWEBUI_DEFAULT_USER_ROLE:-pending}
      ENABLE_SIGNUP_PASSWORD_CONFIRMATION: "true"
      ENABLE_DIRECT_CONNECTIONS: ${OPENWEBUI_ENABLE_DIRECT_CONNECTIONS:-false}
      ENABLE_API_KEYS: ${OPENWEBUI_ENABLE_API_KEYS:-false}
      USER_PERMISSIONS_FEATURES_API_KEYS: ${OPENWEBUI_USER_PERMISSIONS_FEATURES_API_KEYS:-false}
      BYPASS_MODEL_ACCESS_CONTROL: ${OPENWEBUI_BYPASS_MODEL_ACCESS_CONTROL:-true}
      PENDING_USER_OVERLAY_TITLE: "账号等待审核"
      PENDING_USER_OVERLAY_CONTENT: "你的账号已提交注册申请。管理员审核通过后即可使用。如需加急，请联系管理员。"
      ENABLE_WEB_SEARCH: ${OPENWEBUI_ENABLE_WEB_SEARCH:-true}
      WEB_SEARCH_ENGINE: ${OPENWEBUI_WEB_SEARCH_ENGINE:-duckduckgo}
      WEB_SEARCH_RESULT_COUNT: ${OPENWEBUI_WEB_SEARCH_RESULT_COUNT:-3}
      WEB_SEARCH_CONCURRENT_REQUESTS: ${OPENWEBUI_WEB_SEARCH_CONCURRENT_REQUESTS:-1}
      WEB_LOADER_ENGINE: safe_web
      WEB_LOADER_CONCURRENT_REQUESTS: ${OPENWEBUI_WEB_LOADER_CONCURRENT_REQUESTS:-3}
      BYPASS_WEB_SEARCH_WEB_LOADER: ${OPENWEBUI_BYPASS_WEB_SEARCH_WEB_LOADER:-true}
      BYPASS_WEB_SEARCH_EMBEDDING_AND_RETRIEVAL: ${OPENWEBUI_BYPASS_WEB_SEARCH_EMBEDDING_AND_RETRIEVAL:-true}
      USER_PERMISSIONS_FEATURES_WEB_SEARCH: ${OPENWEBUI_USER_PERMISSIONS_FEATURES_WEB_SEARCH:-true}
      PERSONAL_BROWSER_HEADLESS: "true"
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./open-webui_data:/app/backend/data
    expose:
      - "8080"
    networks:
      - ai-net
    depends_on:
      postgres:
        condition: service_healthy
      newapi:
        condition: service_started

  gpt-image-playground:
    image: ghcr.io/cooksleep/gpt_image_playground:latest
    container_name: gpt-image-playground
    restart: always
    logging: *default-logging
    environment:
      ENABLE_API_PROXY: "true"
      LOCK_API_PROXY: "true"
      API_PROXY_URL: http://newapi:3000/v1
      DEFAULT_API_URL: https://${IMAGE_DOMAIN:-image.example.com}/api-proxy
      IMAGE_SHARED_API_KEY: ${IMAGE_SHARED_API_KEY:-}
    volumes:
      - ./scripts/99-volans-autofill.sh:/docker-entrypoint.d/99-volans-autofill.sh:ro
    expose:
      - "80"
    networks:
      - ai-net
    depends_on:
      newapi:
        condition: service_started

  caddy-image:
    image: caddy:${CADDY_VERSION:-2-alpine}
    container_name: caddy-image
    restart: always
    logging: *default-logging
    environment:
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL}
      IMAGE_DOMAIN: ${IMAGE_DOMAIN:-image.example.com}
      IMAGE_BASIC_AUTH_USER: ${IMAGE_BASIC_AUTH_USER:-volans-image}
      IMAGE_BASIC_AUTH_HASH: ${IMAGE_BASIC_AUTH_HASH}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.image:/etc/caddy/Caddyfile:ro
      - ./caddy_logs:/var/log/caddy
      - ./caddy_data:/data
      - ./caddy_config:/config
    networks:
      - ai-net
    depends_on:
      gpt-image-playground:
        condition: service_started

  cloudflared:
    image: cloudflare/cloudflared:${CLOUDFLARED_VERSION:-latest}
    container_name: cloudflare-tunnel
    restart: always
    logging: *default-logging
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN}
    networks:
      - ai-net
      - xui_default
    depends_on:
      - open-webui
      - newapi
