name: lobehub

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  lobe:
    image: lobehub/lobehub:${LOBEHUB_VERSION:-latest}
    container_name: lobehub
    restart: always
    network_mode: host
    logging: *default-logging
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
      searxng:
        condition: service_started
    env_file:
      - .env
    environment:
      KEY_VAULTS_SECRET: ${KEY_VAULTS_SECRET}
      AUTH_SECRET: ${AUTH_SECRET}
      HOSTNAME: 127.0.0.1
      PORT: "3210"
      APP_URL: ${APP_URL:-http://127.0.0.1:3210}
      INTERNAL_APP_URL: ${INTERNAL_APP_URL:-http://127.0.0.1:3210}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@127.0.0.1:${POSTGRES_HOST_PORT:-15432}/${LOBE_DB_NAME:-lobechat}
      REDIS_URL: redis://127.0.0.1:${REDIS_HOST_PORT:-16379}
      REDIS_PREFIX: ${REDIS_PREFIX:-lobechat}
      REDIS_TLS: "0"
      S3_ENDPOINT: ${S3_ENDPOINT:-http://127.0.0.1:9000}
      S3_BUCKET: ${RUSTFS_LOBE_BUCKET:-lobe}
      S3_ENABLE_PATH_STYLE: ${S3_ENABLE_PATH_STYLE:-1}
      S3_SET_ACL: ${S3_SET_ACL:-0}
      S3_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      S3_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY}
      S3_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY}
      LLM_VISION_IMAGE_USE_BASE64: "1"
      SEARXNG_URL: http://127.0.0.1:${SEARXNG_HOST_PORT:-18080}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,.local}
      http_proxy: ${HTTP_PROXY:-}
      https_proxy: ${HTTPS_PROXY:-}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,.local}
      TZ: ${TZ:-Asia/Shanghai}

  postgresql:
    image: paradedb/paradedb:${PARADEDB_VERSION:-latest-pg17}
    container_name: lobe-postgres
    restart: always
    logging: *default-logging
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${LOBE_DB_NAME:-lobechat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - lobe-network

  redis:
    image: redis:${REDIS_VERSION:-7-alpine}
    container_name: lobe-redis
    restart: always
    logging: *default-logging
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-16379}:6379"
    command: redis-server --save 60 1000 --appendonly yes
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lobe-network

  rustfs:
    image: rustfs/rustfs:${RUSTFS_VERSION:-latest}
    container_name: lobe-rustfs
    restart: always
    logging: *default-logging
    ports:
      - "127.0.0.1:${RUSTFS_PORT:-9000}:9000"
      - "127.0.0.1:${RUSTFS_ADMIN_PORT:-9001}:9001"
    environment:
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./rustfs_data:/data
      - ./rustfs_logs:/logs
    command: ["--access-key", "${RUSTFS_ACCESS_KEY}", "--secret-key", "${RUSTFS_SECRET_KEY}", "/data"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - lobe-network

  rustfs-init:
    image: minio/mc:latest
    container_name: lobe-rustfs-init
    depends_on:
      rustfs:
        condition: service_healthy
    volumes:
      - ./bucket.config.json:/bucket.config.json:ro
    entrypoint: /bin/sh
    command: >-
      -c 'set -eu;
      mc alias set rustfs http://rustfs:9000 "$${RUSTFS_ACCESS_KEY}" "$${RUSTFS_SECRET_KEY}";
      mc mb "rustfs/$${RUSTFS_LOBE_BUCKET}" --ignore-existing;
      mc anonymous set-json /bucket.config.json "rustfs/$${RUSTFS_LOBE_BUCKET}"'
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_LOBE_BUCKET: ${RUSTFS_LOBE_BUCKET:-lobe}
    restart: "no"
    networks:
      - lobe-network

  searxng:
    image: searxng/searxng:${SEARXNG_VERSION:-latest}
    container_name: lobe-searxng
    restart: always
    logging: *default-logging
    ports:
      - "127.0.0.1:${SEARXNG_HOST_PORT:-18080}:8080"
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_SETTINGS_FILE: /etc/searxng/settings.yml
      SEARXNG_SECRET: ${SEARXNG_SECRET}
      SEARXNG_BIND_ADDRESS: 0.0.0.0
      SEARXNG_PORT: 8080
      TZ: ${TZ:-Asia/Shanghai}
    networks:
      - lobe-network

networks:
  lobe-network:
    driver: bridge
